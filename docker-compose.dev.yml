# =============================================================================
# Docker Compose - Development (Infrastructure Only)
# =============================================================================
# Menjalankan semua service KECUALI Next.js.
# Next.js dijalankan terpisah via: npm run dev
#
# Usage:
#   docker-compose -f docker-compose.dev.yml up -d
#   npm run dev
# =============================================================================

services:
  cache:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: native_rft_cache_dev
    command: dragonfly --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - ./dragonfly_data:/data
    ulimits:
      memlock: -1
    restart: unless-stopped
    networks:
      - native_rft_network_dev

  postgres:
    image: postgres:15-alpine
    container_name: native_rft_db_dev
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    # Host port 15432 avoids clash with PostgreSQL installed on Windows (often already on 5432).
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - native_rft_network_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: native_rft_minio_dev
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./minio_data:/data
    restart: unless-stopped
    networks:
      - native_rft_network_dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: native_rft_keycloak_dev
    command: start-dev
    ports:
      - "8080:8080"
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak
      - KC_DB_USERNAME=${POSTGRES_USER}
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD}
      - KC_DB_SCHEMA=public
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_HTTP_RELATIVE_PATH=/
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - native_rft_network_dev
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  native_rft_network_dev:
    driver: bridge

volumes:
  postgres-data:
