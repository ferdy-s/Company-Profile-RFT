# Production-style stack (nama container & jaringan mengikuti pola server, contoh: native_tapp_*).
# Pastikan jaringan global sudah ada di host: docker network create global-net
#
# Publish port ke host (lanjut setelah 8090 = native_jkt_pos_pma di srv673856):
#   8091 → Next.js (3000) | native_rft_web
#   8092 → Dragonfly (6379)  | native_rft_cache
#   8093 → MinIO S3 (9000)    | native_rft_minio
#   8094 → MinIO Console (9001)
#   8095 → Keycloak (8080)
# Postgres tidak di-publish (hanya jaringan internal).
# Nginx Proxy Manager: upstream ke IP host + port di atas (atau hostname Docker di global-net).
#
# Domain (HTTPS di reverse proxy → container):
#   rftdigitalsolution.com | s3.* | s3-ui.* | keycloak.* | dragonfly.*
# Lihat .env untuk KEYCLOAK_PUBLIC_HOST, MINIO_SERVER_URL, MINIO_BROWSER_REDIRECT_URL.
#
# Jaringan:
# - native_rft_network: semua service (komunikasi internal).
# - global-net: reverse proxy / app lain yang perlu upstream ke web, Keycloak, MinIO, Dragonfly.
#   Postgres tetap hanya native_rft_network.
#
# Skema DB pertama kali / setelah ubah schema Prisma (dari folder project di server):
#   docker compose --profile tools run --rm prisma-setup
# Lalu isi data (opsional):
#   docker compose --profile tools run --rm prisma-setup sh -c "npm ci && npm run db:seed && npm run db:seed:marketing"

services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    image: native_rft_web:latest
    container_name: native_rft_web
    restart: unless-stopped
    ports:
      - "8091:3000"
    environment:
      # Wajib: Docker mengisi HOSTNAME=container-id; Next standalone memakai itu untuk listen()
      # sehingga port 3000 hanya terbuka di loopback → NPM/global-net dapat connection refused.
      - HOSTNAME=0.0.0.0
      - NODE_ENV=${NODE_ENV}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@cache:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DATABASE_URL=${DATABASE_URL}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER}
      # Discovery OIDC dari jaringan Docker (realm = path di KEYCLOAK_ISSUER). Mengatasi fetch ke URL publik dari container yang sering non-200 (hairpin/proxy).
      - KEYCLOAK_WELL_KNOWN=${KEYCLOAK_WELL_KNOWN:-http://keycloak:8080/realms/rft/.well-known/openid-configuration}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION}
    depends_on:
      cache:
        condition: service_started
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - native_rft_network
      - global-net

  cache:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: native_rft_cache
    command: dragonfly --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "8092:6379"
    volumes:
      - ./dragonfly_data:/data
    ulimits:
      memlock: -1
    restart: unless-stopped
    networks:
      - native_rft_network
      - global-net

  postgres:
    image: postgres:15-alpine
    container_name: native_rft_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - native_rft_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: native_rft_minio
    command: server /data --console-address ":9001"
    ports:
      - "8093:9000"
      - "8094:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_SERVER_URL=${MINIO_SERVER_URL}
      - MINIO_BROWSER_REDIRECT_URL=${MINIO_BROWSER_REDIRECT_URL}
    volumes:
      - ./minio_data:/data
    restart: unless-stopped
    networks:
      - native_rft_network
      - global-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: native_rft_keycloak
    command: start
    ports:
      - "8095:8080"
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak
      - KC_DB_USERNAME=${POSTGRES_USER}
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD}
      - KC_DB_SCHEMA=public
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_HOSTNAME=${KEYCLOAK_PUBLIC_HOST}
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
      - KC_HTTP_RELATIVE_PATH=/
      - KC_PROXY_HEADERS=xforwarded
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - native_rft_network
      - global-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # Sekali pakai: sinkronkan tabel Prisma ke Postgres (image Next produksi tidak berisi Prisma CLI).
  prisma-setup:
    image: node:20-bookworm-slim
    profiles:
      - tools
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: development
    networks:
      - native_rft_network
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npm ci && npx prisma generate && npx prisma db push"

networks:
  native_rft_network:
    driver: bridge
  global-net:
    external: true

volumes:
  postgres-data:
